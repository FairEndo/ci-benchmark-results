<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CI Benchmark Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg-primary: #1a1a2e;
                --bg-secondary: #16213e;
                --bg-card: #0f3460;
                --bg-card-alt: #1a1a40;
                --text-primary: #e0e0e0;
                --text-secondary: #a0a0b8;
                --text-heading: #f5f5f5;
                --border-color: #2a2a4a;
                --accent: #4361ee;
                --accent-hover: #5a7bff;
                --color-blue: #4361ee;
                --color-orange: #f77f00;
                --color-green: #2a9d8f;
                --color-red: #e63946;
                --color-purple: #9b5de5;
                --color-yellow: #f4d35e;
                --color-cyan: #00b4d8;
                --color-pink: #ff6b9d;
                --row-even: rgba(67, 97, 238, 0.06);
                --row-hover: rgba(67, 97, 238, 0.12);
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background-color: var(--bg-primary);
                color: var(--text-primary);
                line-height: 1.6;
                min-height: 100vh;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 24px 20px;
            }

            /* Header */
            .header {
                text-align: center;
                padding: 32px 20px 24px;
                margin-bottom: 32px;
                border-bottom: 1px solid var(--border-color);
            }

            .header h1 {
                font-size: 2rem;
                font-weight: 700;
                color: var(--text-heading);
                margin-bottom: 8px;
                letter-spacing: -0.02em;
            }

            .header .subtitle {
                font-size: 0.95rem;
                color: var(--text-secondary);
            }

            .header .last-updated {
                display: inline-block;
                margin-top: 10px;
                padding: 4px 14px;
                background: var(--bg-card);
                border-radius: 20px;
                font-size: 0.82rem;
                color: var(--text-secondary);
            }

            /* Cards */
            .card {
                background: var(--bg-secondary);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 24px;
                margin-bottom: 28px;
            }

            .card h2 {
                font-size: 1.25rem;
                font-weight: 600;
                color: var(--text-heading);
                margin-bottom: 18px;
                padding-bottom: 10px;
                border-bottom: 1px solid var(--border-color);
            }

            .card h2 .badge {
                display: inline-block;
                font-size: 0.72rem;
                font-weight: 500;
                background: var(--accent);
                color: #fff;
                padding: 2px 10px;
                border-radius: 12px;
                margin-left: 10px;
                vertical-align: middle;
            }

            /* Table */
            .table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.88rem;
                white-space: nowrap;
            }

            thead th {
                background: var(--bg-card);
                color: var(--text-heading);
                font-weight: 600;
                text-align: left;
                padding: 12px 14px;
                border-bottom: 2px solid var(--border-color);
                position: sticky;
                top: 0;
                z-index: 1;
            }

            thead th:first-child {
                border-radius: 8px 0 0 0;
            }
            thead th:last-child {
                border-radius: 0 8px 0 0;
            }

            tbody td {
                padding: 10px 14px;
                border-bottom: 1px solid var(--border-color);
                color: var(--text-primary);
            }

            tbody tr:nth-child(even) {
                background: var(--row-even);
            }

            tbody tr:hover {
                background: var(--row-hover);
            }

            .score-cell {
                font-weight: 600;
                font-variant-numeric: tabular-nums;
            }

            .unit {
                font-weight: 400;
                color: var(--text-secondary);
                font-size: 0.8rem;
                margin-left: 3px;
            }

            .stddev {
                color: var(--text-secondary);
                font-size: 0.82rem;
                font-variant-numeric: tabular-nums;
            }

            .na {
                color: var(--text-secondary);
                font-style: italic;
            }

            .provider-badge {
                display: inline-block;
                padding: 2px 10px;
                border-radius: 6px;
                font-size: 0.8rem;
                font-weight: 500;
                background: rgba(67, 97, 238, 0.15);
                color: var(--color-blue);
            }

            .rank-cell {
                font-weight: 700;
                color: var(--accent);
            }

            /* Charts Grid */
            .charts-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 28px;
                margin-bottom: 28px;
            }

            .chart-container {
                position: relative;
                width: 100%;
                min-height: 320px;
            }

            .chart-container canvas {
                width: 100% !important;
            }

            /* Tier sections */
            .tier-section {
                margin-bottom: 48px;
            }

            .tier-heading {
                font-size: 1.55rem;
                font-weight: 700;
                color: var(--text-heading);
                margin-bottom: 4px;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .tier-heading .tier-badge {
                display: inline-block;
                font-size: 0.75rem;
                font-weight: 500;
                background: var(--accent);
                color: #fff;
                padding: 3px 12px;
                border-radius: 12px;
            }

            .tier-meta {
                font-size: 0.88rem;
                color: var(--text-secondary);
                margin-bottom: 20px;
            }

            .tier-divider {
                border: none;
                border-top: 1px solid var(--border-color);
                margin: 8px 0 24px;
            }

            /* Loading & Error */
            .loading-state,
            .error-state {
                text-align: center;
                padding: 80px 20px;
            }

            .loading-state {
                color: var(--text-secondary);
            }

            .spinner {
                display: inline-block;
                width: 40px;
                height: 40px;
                border: 3px solid var(--border-color);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                margin-bottom: 16px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .error-state {
                color: var(--color-red);
            }

            .error-state .error-icon {
                font-size: 2.5rem;
                margin-bottom: 12px;
            }

            .error-state .error-msg {
                font-size: 0.95rem;
                color: var(--text-secondary);
                max-width: 500px;
                margin: 8px auto 0;
            }

            /* Timing Stats */
            .timing-stats-card {
                margin-top: 48px;
            }

            .timing-stats-card .table-wrapper {
                max-height: 600px;
                overflow-y: auto;
            }

            .timing-cell {
                font-variant-numeric: tabular-nums;
                text-align: right;
            }

            .timing-warn {
                color: #f77f00;
                font-weight: 600;
            }

            .timing-critical {
                color: #e63946;
                font-weight: 600;
            }

            .timing-good {
                color: #2a9d8f;
            }

            .sort-btn {
                background: none;
                border: none;
                color: inherit;
                font: inherit;
                font-weight: 600;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 0;
            }

            .sort-btn:hover {
                color: #5a7bff;
            }

            .sort-arrow {
                font-size: 0.7rem;
                opacity: 0.4;
            }

            .sort-arrow.active {
                opacity: 1;
                color: #4361ee;
            }

            /* Footer */
            .footer {
                text-align: center;
                padding: 24px 20px;
                margin-top: 12px;
                border-top: 1px solid var(--border-color);
                color: var(--text-secondary);
                font-size: 0.88rem;
            }

            /* Responsive */
            @media (max-width: 900px) {
                .charts-grid {
                    grid-template-columns: 1fr;
                }

                .header h1 {
                    font-size: 1.5rem;
                }

                .tier-heading {
                    font-size: 1.25rem;
                }

                .card {
                    padding: 16px;
                }

                table {
                    font-size: 0.82rem;
                }

                thead th,
                tbody td {
                    padding: 8px 10px;
                }
            }

            @media (max-width: 600px) {
                .container {
                    padding: 12px 10px;
                }

                .header {
                    padding: 20px 12px 16px;
                    margin-bottom: 20px;
                }

                .charts-grid {
                    gap: 16px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header class="header">
                <h1>CI Benchmark Dashboard</h1>
                <p class="subtitle">
                    Comparative performance metrics across CI providers and
                    runners, grouped by hardware tier
                </p>
                <div class="last-updated" id="last-updated"></div>
            </header>

            <div id="loading" class="loading-state">
                <div class="spinner"></div>
                <p>Loading benchmark data&hellip;</p>
            </div>

            <div id="error" class="error-state" style="display: none">
                <div class="error-icon">&#9888;</div>
                <p><strong>Failed to load benchmark data</strong></p>
                <p class="error-msg" id="error-detail"></p>
            </div>

            <main id="dashboard" style="display: none">
                <!-- Tier sections are rendered dynamically here -->
                <div id="tier-container"></div>

                <!-- Run Timing Stats table -->
                <div id="timing-stats-container"></div>

                <!-- Global timeline chart -->
                <section class="card" id="timeline-section">
                    <h2>Performance Over Time</h2>
                    <div class="chart-container" style="min-height: 380px">
                        <canvas id="timeline-chart"></canvas>
                    </div>
                </section>
            </main>

            <footer class="footer" id="footer" style="display: none"></footer>
        </div>

        <script>
            (function () {
                "use strict";

                /* Colorblind-friendly palette */
                var PALETTE = [
                    "#4361ee",
                    "#f77f00",
                    "#2a9d8f",
                    "#e63946",
                    "#9b5de5",
                    "#f4d35e",
                    "#00b4d8",
                    "#ff6b9d",
                ];

                /* ---- Helpers ---- */

                function comboKey(run) {
                    return run.provider + "|" + run.runner;
                }

                function fmtNum(n, decimals) {
                    if (n == null) return null;
                    decimals = decimals != null ? decimals : 2;
                    return Number(n).toLocaleString(undefined, {
                        minimumFractionDigits: decimals,
                        maximumFractionDigits: decimals,
                    });
                }

                function fmtRAM(mb) {
                    if (mb == null) return "\u2014";
                    if (mb >= 1024) return (mb / 1024).toFixed(1) + " GiB";
                    return mb + " MiB";
                }

                function fmtDate(iso) {
                    var d = new Date(iso);
                    return d.toLocaleDateString(undefined, {
                        year: "numeric",
                        month: "short",
                        day: "numeric",
                        hour: "2-digit",
                        minute: "2-digit",
                        timeZoneName: "short",
                    });
                }

                function shortLabel(run) {
                    return run.provider + " / " + run.runner;
                }

                /* Infer OS from runner name */
                function inferOS(runner) {
                    var r = runner.toLowerCase();
                    if (r.indexOf("ubuntu") !== -1 || r.indexOf("linux") !== -1)
                        return "Linux";
                    if (r.indexOf("windows") !== -1 || r.indexOf("win") === 0)
                        return "Windows";
                    if (
                        r.indexOf("macos") !== -1 ||
                        r.indexOf("mac-os") !== -1 ||
                        r.indexOf("osx") !== -1
                    )
                        return "macOS";
                    return "Unknown";
                }

                function tierKey(run) {
                    var os = inferOS(run.runner);
                    var vcpus =
                        run.system && run.system.vcpus != null
                            ? String(run.system.vcpus)
                            : "unknown";
                    return os + "|" + vcpus;
                }

                function tierLabel(run) {
                    var os = inferOS(run.runner);
                    var vcpus =
                        run.system && run.system.vcpus != null
                            ? run.system.vcpus
                            : null;
                    var parts = [shortLabel(run)];
                    var tierParts = [];
                    if (os !== "Unknown") tierParts.push(os);
                    if (vcpus != null)
                        tierParts.push(
                            vcpus + " vCPU" + (vcpus !== 1 ? "s" : ""),
                        );
                    if (tierParts.length > 0)
                        parts.push("(" + tierParts.join(", ") + ")");
                    return parts.join(" ");
                }

                function esc(str) {
                    var el = document.createElement("span");
                    el.textContent = str;
                    return el.innerHTML;
                }

                function chartColors(i) {
                    return PALETTE[i % PALETTE.length];
                }

                /* Keep only the latest run per provider+runner combo */
                function dedup(runs) {
                    var map = {};
                    runs.forEach(function (r) {
                        var k = comboKey(r);
                        if (
                            !map[k] ||
                            new Date(r.timestamp) > new Date(map[k].timestamp)
                        ) {
                            map[k] = r;
                        }
                    });
                    return Object.values(map);
                }

                /* Group runs by OS + vCPU count, return sorted array of tier objects */
                function groupByTier(latest) {
                    var tiers = {};
                    latest.forEach(function (run) {
                        var k = tierKey(run);
                        if (!tiers[k]) tiers[k] = [];
                        tiers[k].push(run);
                    });

                    /* Sort: known OS tiers first (by OS name then vCPUs), unknown last */
                    var keys = Object.keys(tiers);
                    keys.sort(function (a, b) {
                        var pa = a.split("|");
                        var pb = b.split("|");
                        var osA = pa[0],
                            vcpuA = pa[1];
                        var osB = pb[0],
                            vcpuB = pb[1];

                        /* Push fully unknown tiers to the end */
                        var unknownA =
                            osA === "Unknown" && vcpuA === "unknown" ? 1 : 0;
                        var unknownB =
                            osB === "Unknown" && vcpuB === "unknown" ? 1 : 0;
                        if (unknownA !== unknownB) return unknownA - unknownB;

                        /* Sort by OS name, then by vCPU count */
                        if (osA !== osB) return osA < osB ? -1 : 1;
                        var nA = vcpuA !== "unknown" ? Number(vcpuA) : Infinity;
                        var nB = vcpuB !== "unknown" ? Number(vcpuB) : Infinity;
                        return nA - nB;
                    });

                    return keys.map(function (k) {
                        var runs = tiers[k];
                        var parts = k.split("|");
                        var os = parts[0];
                        var vcpuStr = parts[1];
                        var vcpus =
                            vcpuStr !== "unknown" ? Number(vcpuStr) : null;

                        /* compute RAM range */
                        var ramValues = runs
                            .map(function (r) {
                                return r.system && r.system.ram_mb != null
                                    ? r.system.ram_mb
                                    : null;
                            })
                            .filter(function (v) {
                                return v != null;
                            });
                        var ramMin =
                            ramValues.length > 0
                                ? Math.min.apply(null, ramValues)
                                : null;
                        var ramMax =
                            ramValues.length > 0
                                ? Math.max.apply(null, ramValues)
                                : null;

                        return {
                            key: k,
                            os: os,
                            vcpus: vcpus,
                            runs: runs,
                            ramMin: ramMin,
                            ramMax: ramMax,
                        };
                    });
                }

                /* ---- Rendering ---- */

                function renderHeader(runs) {
                    var latest = runs.reduce(function (a, b) {
                        return new Date(a.timestamp) > new Date(b.timestamp)
                            ? a
                            : b;
                    });
                    document.getElementById("last-updated").textContent =
                        "Last updated: " + fmtDate(latest.timestamp);
                }

                /* Build the DOM for a single tier section */
                function renderTierSection(tier, tierIndex) {
                    var container = document.getElementById("tier-container");

                    var section = document.createElement("div");
                    section.className = "tier-section";

                    /* Tier heading */
                    var heading = document.createElement("div");
                    heading.className = "tier-heading";

                    var titleParts = [];
                    if (tier.os !== "Unknown") titleParts.push(tier.os);
                    if (tier.vcpus != null)
                        titleParts.push(
                            tier.vcpus +
                                " vCPU" +
                                (tier.vcpus !== 1 ? "s" : ""),
                        );
                    var title =
                        titleParts.length > 0
                            ? titleParts.join(" \u00b7 ")
                            : "Unknown Hardware Tier";
                    heading.innerHTML =
                        esc(title) +
                        '<span class="tier-badge">' +
                        tier.runs.length +
                        " runner" +
                        (tier.runs.length !== 1 ? "s" : "") +
                        "</span>";
                    section.appendChild(heading);

                    /* Tier meta */
                    var meta = document.createElement("div");
                    meta.className = "tier-meta";
                    var metaParts = [];
                    if (tier.ramMin != null && tier.ramMax != null) {
                        if (tier.ramMin === tier.ramMax) {
                            metaParts.push(fmtRAM(tier.ramMin) + " RAM");
                        } else {
                            metaParts.push(
                                fmtRAM(tier.ramMin) +
                                    " \u2013 " +
                                    fmtRAM(tier.ramMax) +
                                    " RAM",
                            );
                        }
                    }
                    meta.textContent = metaParts.join(" \u00b7 ");
                    section.appendChild(meta);

                    var hr = document.createElement("hr");
                    hr.className = "tier-divider";
                    section.appendChild(hr);

                    /* Leaderboard */
                    var leaderCard = document.createElement("section");
                    leaderCard.className = "card";

                    var lh2 = document.createElement("h2");
                    lh2.innerHTML =
                        "Leaderboard" +
                        '<span class="badge">' +
                        tier.runs.length +
                        " runner" +
                        (tier.runs.length !== 1 ? "s" : "") +
                        "</span>";
                    leaderCard.appendChild(lh2);

                    var tableWrap = document.createElement("div");
                    tableWrap.className = "table-wrapper";

                    var table = document.createElement("table");
                    var thead = document.createElement("thead");
                    thead.innerHTML =
                        "<tr>" +
                        "<th>#</th>" +
                        "<th>Provider</th>" +
                        "<th>Runner</th>" +
                        "<th>CPU Score</th>" +
                        "<th>CPU Stddev</th>" +
                        "<th>Memory Throughput</th>" +
                        "<th>Mem Stddev</th>" +
                        "<th>Processor</th>" +
                        "<th>vCPUs</th>" +
                        "<th>RAM</th>" +
                        "</tr>";
                    table.appendChild(thead);

                    var tbody = document.createElement("tbody");
                    var sorted = tier.runs.slice().sort(function (a, b) {
                        var aScore =
                            a.benchmarks && a.benchmarks.cpu
                                ? a.benchmarks.cpu.median
                                : 0;
                        var bScore =
                            b.benchmarks && b.benchmarks.cpu
                                ? b.benchmarks.cpu.median
                                : 0;
                        return bScore - aScore;
                    });

                    sorted.forEach(function (run, i) {
                        var cpu =
                            run.benchmarks && run.benchmarks.cpu
                                ? run.benchmarks.cpu
                                : null;
                        var mem =
                            run.benchmarks && run.benchmarks.memory
                                ? run.benchmarks.memory
                                : null;
                        var sys = run.system || {};

                        var tr = document.createElement("tr");
                        tr.innerHTML =
                            '<td class="rank-cell">' +
                            (i + 1) +
                            "</td>" +
                            '<td><span class="provider-badge">' +
                            esc(run.provider) +
                            "</span></td>" +
                            "<td>" +
                            esc(run.runner) +
                            "</td>" +
                            '<td class="score-cell">' +
                            (cpu
                                ? fmtNum(cpu.median) +
                                  '<span class="unit">' +
                                  esc(cpu.unit) +
                                  "</span>"
                                : '<span class="na">&mdash;</span>') +
                            "</td>" +
                            '<td class="stddev">' +
                            (cpu
                                ? "&plusmn;" + fmtNum(cpu.stddev)
                                : '<span class="na">&mdash;</span>') +
                            "</td>" +
                            '<td class="score-cell">' +
                            (mem
                                ? fmtNum(mem.median) +
                                  '<span class="unit">' +
                                  esc(mem.unit) +
                                  "</span>"
                                : '<span class="na">&mdash;</span>') +
                            "</td>" +
                            '<td class="stddev">' +
                            (mem
                                ? "&plusmn;" + fmtNum(mem.stddev)
                                : '<span class="na">&mdash;</span>') +
                            "</td>" +
                            "<td>" +
                            esc(sys.processor || "\u2014") +
                            "</td>" +
                            "<td>" +
                            (sys.vcpus != null ? sys.vcpus : "\u2014") +
                            "</td>" +
                            "<td>" +
                            fmtRAM(sys.ram_mb) +
                            "</td>";
                        tbody.appendChild(tr);
                    });

                    table.appendChild(tbody);
                    tableWrap.appendChild(table);
                    leaderCard.appendChild(tableWrap);
                    section.appendChild(leaderCard);

                    /* Charts grid */
                    var chartsGrid = document.createElement("div");
                    chartsGrid.className = "charts-grid";

                    /* CPU bar chart */
                    var cpuCard = document.createElement("section");
                    cpuCard.className = "card";
                    var cpuH2 = document.createElement("h2");
                    cpuH2.textContent = "CPU Performance";
                    cpuCard.appendChild(cpuH2);
                    var cpuChartDiv = document.createElement("div");
                    cpuChartDiv.className = "chart-container";
                    var cpuCanvas = document.createElement("canvas");
                    cpuCanvas.id = "cpu-bar-tier-" + tierIndex;
                    cpuChartDiv.appendChild(cpuCanvas);
                    cpuCard.appendChild(cpuChartDiv);
                    chartsGrid.appendChild(cpuCard);

                    /* Memory bar chart */
                    var memCard = document.createElement("section");
                    memCard.className = "card";
                    var memH2 = document.createElement("h2");
                    memH2.textContent = "Memory Performance";
                    memCard.appendChild(memH2);
                    var memChartDiv = document.createElement("div");
                    memChartDiv.className = "chart-container";
                    var memCanvas = document.createElement("canvas");
                    memCanvas.id = "mem-bar-tier-" + tierIndex;
                    memChartDiv.appendChild(memCanvas);
                    memCard.appendChild(memChartDiv);
                    chartsGrid.appendChild(memCard);

                    section.appendChild(chartsGrid);
                    container.appendChild(section);

                    /* Render the charts */
                    renderCPUBar(sorted, "cpu-bar-tier-" + tierIndex);
                    renderMemBar(sorted, "mem-bar-tier-" + tierIndex);
                }

                /* ---- Bar Charts ---- */

                var errorBarsPlugin = {
                    id: "errorBars",
                    afterDraw: function (chart) {
                        var meta = chart.getDatasetMeta(0);
                        var ds = chart.data.datasets[0];
                        if (!ds.errorBars) return;
                        var ctx2 = chart.ctx;
                        ctx2.save();
                        ctx2.strokeStyle = "#e0e0e0";
                        ctx2.lineWidth = 1.5;
                        meta.data.forEach(function (bar, i) {
                            var xScale = chart.scales.x;
                            var median = ds.data[i];
                            var lo = xScale.getPixelForValue(
                                median - ds.errorBars.mins[i],
                            );
                            var hi = xScale.getPixelForValue(
                                median + ds.errorBars.maxs[i],
                            );
                            var y = bar.y;
                            var capH = 6;
                            ctx2.beginPath();
                            ctx2.moveTo(lo, y);
                            ctx2.lineTo(hi, y);
                            ctx2.stroke();
                            ctx2.beginPath();
                            ctx2.moveTo(lo, y - capH);
                            ctx2.lineTo(lo, y + capH);
                            ctx2.stroke();
                            ctx2.beginPath();
                            ctx2.moveTo(hi, y - capH);
                            ctx2.lineTo(hi, y + capH);
                            ctx2.stroke();
                        });
                        ctx2.restore();
                    },
                };

                function renderCPUBar(tierRuns, canvasId) {
                    var sorted = tierRuns.slice().sort(function (a, b) {
                        var aS =
                            a.benchmarks && a.benchmarks.cpu
                                ? a.benchmarks.cpu.median
                                : 0;
                        var bS =
                            b.benchmarks && b.benchmarks.cpu
                                ? b.benchmarks.cpu.median
                                : 0;
                        return bS - aS;
                    });

                    var labels = [];
                    var medians = [];
                    var mins = [];
                    var maxs = [];
                    var colors = [];

                    sorted.forEach(function (run, i) {
                        var cpu =
                            run.benchmarks && run.benchmarks.cpu
                                ? run.benchmarks.cpu
                                : null;
                        labels.push(shortLabel(run));
                        medians.push(cpu ? cpu.median : 0);
                        mins.push(cpu ? cpu.median - cpu.min : 0);
                        maxs.push(cpu ? cpu.max - cpu.median : 0);
                        colors.push(chartColors(i));
                    });

                    var canvas = document.getElementById(canvasId);
                    if (!canvas) return;

                    var ctx = canvas.getContext("2d");
                    new Chart(ctx, {
                        type: "bar",
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: "CPU Median (events/sec)",
                                    data: medians,
                                    backgroundColor: colors.map(function (c) {
                                        return c + "cc";
                                    }),
                                    borderColor: colors,
                                    borderWidth: 2,
                                    borderRadius: 6,
                                    errorBars: { mins: mins, maxs: maxs },
                                },
                            ],
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            indexAxis: "y",
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: "#16213e",
                                    titleColor: "#f5f5f5",
                                    bodyColor: "#e0e0e0",
                                    borderColor: "#2a2a4a",
                                    borderWidth: 1,
                                    callbacks: {
                                        label: function (ctx) {
                                            var ds = ctx.dataset;
                                            var idx = ctx.dataIndex;
                                            var errMin = ds.errorBars
                                                ? ds.errorBars.mins[idx]
                                                : 0;
                                            var errMax = ds.errorBars
                                                ? ds.errorBars.maxs[idx]
                                                : 0;
                                            var val = ctx.parsed.x;
                                            return (
                                                "Median: " +
                                                fmtNum(val) +
                                                "  (min: " +
                                                fmtNum(val - errMin) +
                                                ", max: " +
                                                fmtNum(val + errMax) +
                                                ")"
                                            );
                                        },
                                    },
                                },
                            },
                            scales: {
                                x: {
                                    grid: { color: "rgba(255,255,255,0.06)" },
                                    ticks: { color: "#a0a0b8" },
                                    title: {
                                        display: true,
                                        text: "events/sec",
                                        color: "#a0a0b8",
                                    },
                                },
                                y: {
                                    grid: { display: false },
                                    ticks: {
                                        color: "#e0e0e0",
                                        font: { size: 11 },
                                    },
                                },
                            },
                        },
                        plugins: [errorBarsPlugin],
                    });
                }

                function renderMemBar(tierRuns, canvasId) {
                    var withMem = tierRuns.filter(function (r) {
                        return r.benchmarks && r.benchmarks.memory;
                    });

                    var canvas = document.getElementById(canvasId);
                    if (!canvas) return;

                    if (withMem.length === 0) {
                        var parent = canvas.parentElement;
                        parent.innerHTML =
                            '<p style="text-align:center;color:var(--text-secondary);padding:60px 0;">No memory benchmark data available.</p>';
                        return;
                    }

                    var sorted = withMem.slice().sort(function (a, b) {
                        return (
                            b.benchmarks.memory.median -
                            a.benchmarks.memory.median
                        );
                    });

                    var labels = [];
                    var medians = [];
                    var mins = [];
                    var maxs = [];
                    var colors = [];

                    sorted.forEach(function (run, i) {
                        var mem = run.benchmarks.memory;
                        labels.push(shortLabel(run));
                        medians.push(mem.median);
                        mins.push(mem.median - mem.min);
                        maxs.push(mem.max - mem.median);
                        colors.push(chartColors(i));
                    });

                    var ctx = canvas.getContext("2d");
                    new Chart(ctx, {
                        type: "bar",
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: "Memory Median (MiB/sec)",
                                    data: medians,
                                    backgroundColor: colors.map(function (c) {
                                        return c + "cc";
                                    }),
                                    borderColor: colors,
                                    borderWidth: 2,
                                    borderRadius: 6,
                                    errorBars: { mins: mins, maxs: maxs },
                                },
                            ],
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            indexAxis: "y",
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: "#16213e",
                                    titleColor: "#f5f5f5",
                                    bodyColor: "#e0e0e0",
                                    borderColor: "#2a2a4a",
                                    borderWidth: 1,
                                    callbacks: {
                                        label: function (ctx) {
                                            var ds = ctx.dataset;
                                            var idx = ctx.dataIndex;
                                            var errMin = ds.errorBars
                                                ? ds.errorBars.mins[idx]
                                                : 0;
                                            var errMax = ds.errorBars
                                                ? ds.errorBars.maxs[idx]
                                                : 0;
                                            var val = ctx.parsed.x;
                                            return (
                                                "Median: " +
                                                fmtNum(val) +
                                                "  (min: " +
                                                fmtNum(val - errMin) +
                                                ", max: " +
                                                fmtNum(val + errMax) +
                                                ")"
                                            );
                                        },
                                    },
                                },
                            },
                            scales: {
                                x: {
                                    grid: { color: "rgba(255,255,255,0.06)" },
                                    ticks: { color: "#a0a0b8" },
                                    title: {
                                        display: true,
                                        text: "MiB/sec",
                                        color: "#a0a0b8",
                                    },
                                },
                                y: {
                                    grid: { display: false },
                                    ticks: {
                                        color: "#e0e0e0",
                                        font: { size: 11 },
                                    },
                                },
                            },
                        },
                        plugins: [errorBarsPlugin],
                    });
                }

                /* ---- Timeline (global, all tiers) ---- */

                function renderTimeline(allRuns) {
                    var groups = {};
                    allRuns.forEach(function (run) {
                        var k = comboKey(run);
                        if (!groups[k])
                            groups[k] = {
                                label: tierLabel(run),
                                runs: [],
                            };
                        groups[k].runs.push(run);
                    });

                    Object.keys(groups).forEach(function (k) {
                        groups[k].runs.sort(function (a, b) {
                            return (
                                new Date(a.timestamp) - new Date(b.timestamp)
                            );
                        });
                    });

                    var datasets = [];
                    var colorIdx = 0;
                    var allKeys = Object.keys(groups).sort();

                    allKeys.forEach(function (k) {
                        var g = groups[k];
                        var color = chartColors(colorIdx++);
                        var data = g.runs
                            .map(function (r) {
                                return {
                                    x: r.timestamp,
                                    y:
                                        r.benchmarks && r.benchmarks.cpu
                                            ? r.benchmarks.cpu.median
                                            : null,
                                };
                            })
                            .filter(function (pt) {
                                return pt.y != null;
                            });

                        datasets.push({
                            label: g.label,
                            data: data,
                            borderColor: color,
                            backgroundColor: color + "33",
                            pointBackgroundColor: color,
                            pointBorderColor: color,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            tension: 0.3,
                            fill: false,
                            borderWidth: 2.5,
                        });
                    });

                    var ctx = document
                        .getElementById("timeline-chart")
                        .getContext("2d");
                    new Chart(ctx, {
                        type: "line",
                        data: { datasets: datasets },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: {
                                mode: "nearest",
                                intersect: false,
                            },
                            plugins: {
                                legend: {
                                    labels: {
                                        color: "#e0e0e0",
                                        usePointStyle: true,
                                        padding: 16,
                                    },
                                },
                                tooltip: {
                                    backgroundColor: "#16213e",
                                    titleColor: "#f5f5f5",
                                    bodyColor: "#e0e0e0",
                                    borderColor: "#2a2a4a",
                                    borderWidth: 1,
                                    callbacks: {
                                        title: function (items) {
                                            if (items.length > 0)
                                                return fmtDate(items[0].raw.x);
                                            return "";
                                        },
                                        label: function (ctx) {
                                            return (
                                                ctx.dataset.label +
                                                ": " +
                                                fmtNum(ctx.parsed.y) +
                                                " events/sec"
                                            );
                                        },
                                    },
                                },
                            },
                            scales: {
                                x: {
                                    type: "time",
                                    time: {
                                        tooltipFormat: "PPpp",
                                        displayFormats: {
                                            hour: "MMM d, HH:mm",
                                            day: "MMM d",
                                            month: "MMM yyyy",
                                        },
                                    },
                                    grid: { color: "rgba(255,255,255,0.06)" },
                                    ticks: {
                                        color: "#a0a0b8",
                                        maxRotation: 45,
                                    },
                                    title: {
                                        display: true,
                                        text: "Date",
                                        color: "#a0a0b8",
                                    },
                                },
                                y: {
                                    grid: { color: "rgba(255,255,255,0.06)" },
                                    ticks: { color: "#a0a0b8" },
                                    title: {
                                        display: true,
                                        text: "CPU Median (events/sec)",
                                        color: "#a0a0b8",
                                    },
                                },
                            },
                        },
                    });
                }

                /* ---- Timing Stats Table ---- */

                function renderTimingStats(allRuns) {
                    var container = document.getElementById(
                        "timing-stats-container",
                    );

                    var section = document.createElement("section");
                    section.className = "card timing-stats-card";

                    var h2 = document.createElement("h2");
                    h2.innerHTML =
                        "Run Timing Details" +
                        '<span class="badge">' +
                        allRuns.length +
                        " run" +
                        (allRuns.length !== 1 ? "s" : "") +
                        "</span>";
                    section.appendChild(h2);

                    var tableWrap = document.createElement("div");
                    tableWrap.className = "table-wrapper";

                    var table = document.createElement("table");
                    table.id = "timing-stats-table";

                    /* Column definitions */
                    var cols = [
                        { key: "provider", label: "Provider", type: "text" },
                        { key: "runner", label: "Runner", type: "text" },
                        { key: "createdAt", label: "Created At", type: "date" },
                        { key: "startedAt", label: "Started At", type: "date" },
                        { key: "stoppedAt", label: "Stopped At", type: "date" },
                        {
                            key: "totalTime",
                            label: "Computed Total Time (s)",
                            type: "num",
                        },
                        {
                            key: "queuedTime",
                            label: "Computed Queued Time (s)",
                            type: "num",
                        },
                        {
                            key: "runTime",
                            label: "Computed Run Time (s)",
                            type: "num",
                        },
                        {
                            key: "reportedDur",
                            label: "Reported Duration (s)",
                            type: "num",
                        },
                        {
                            key: "reportedQueued",
                            label: "Reported Queued Time (s)",
                            type: "num",
                        },
                    ];

                    /* Build row data */
                    var rows = allRuns.map(function (run) {
                        var t = run.timing || {};
                        var createdAt = t.trigger_time || null;
                        var startedAt = t.job_started_at || null;

                        var totalTime =
                            t.total_seconds != null ? t.total_seconds : null;
                        var queuedTime =
                            t.queue_seconds != null ? t.queue_seconds : null;
                        var runTime =
                            totalTime != null && queuedTime != null
                                ? totalTime - queuedTime
                                : null;

                        /* Compute stoppedAt from startedAt + runTime (or totalTime - queuedTime) */
                        var stoppedAt = null;
                        if (
                            startedAt &&
                            totalTime != null &&
                            queuedTime != null
                        ) {
                            var started = new Date(startedAt);
                            stoppedAt = new Date(
                                started.getTime() + runTime * 1000,
                            ).toISOString();
                        }

                        /* Reported fields — check if they exist in the data */
                        var reportedDur =
                            t.reported_duration != null
                                ? t.reported_duration
                                : null;
                        var reportedQueued =
                            t.reported_queued != null
                                ? t.reported_queued
                                : null;

                        return {
                            provider: run.provider || "\u2014",
                            runner: run.runner || "\u2014",
                            createdAt: createdAt,
                            startedAt: startedAt,
                            stoppedAt: stoppedAt,
                            totalTime: totalTime,
                            queuedTime: queuedTime,
                            runTime: runTime,
                            reportedDur: reportedDur,
                            reportedQueued: reportedQueued,
                        };
                    });

                    /* Sort state */
                    var currentSort = { key: "createdAt", asc: false };

                    function sortRows(key, type) {
                        if (currentSort.key === key) {
                            currentSort.asc = !currentSort.asc;
                        } else {
                            currentSort.key = key;
                            currentSort.asc = true;
                        }
                        rows.sort(function (a, b) {
                            var va = a[key],
                                vb = b[key];
                            if (va == null && vb == null) return 0;
                            if (va == null) return 1;
                            if (vb == null) return -1;
                            if (type === "date") {
                                va = new Date(va).getTime();
                                vb = new Date(vb).getTime();
                            } else if (type === "num") {
                                va = Number(va);
                                vb = Number(vb);
                            } else {
                                va = String(va).toLowerCase();
                                vb = String(vb).toLowerCase();
                            }
                            if (va < vb) return currentSort.asc ? -1 : 1;
                            if (va > vb) return currentSort.asc ? 1 : -1;
                            return 0;
                        });
                        renderBody();
                        updateSortArrows();
                    }

                    /* Thead */
                    var thead = document.createElement("thead");
                    var headRow = document.createElement("tr");
                    cols.forEach(function (col) {
                        var th = document.createElement("th");
                        if (col.type === "num") th.style.textAlign = "right";
                        var btn = document.createElement("button");
                        btn.className = "sort-btn";
                        btn.setAttribute("data-col", col.key);
                        btn.innerHTML =
                            esc(col.label) +
                            ' <span class="sort-arrow" data-arrow="' +
                            col.key +
                            '">\u25B2</span>';
                        btn.addEventListener("click", function () {
                            sortRows(col.key, col.type);
                        });
                        th.appendChild(btn);
                        headRow.appendChild(th);
                    });
                    thead.appendChild(headRow);
                    table.appendChild(thead);

                    /* Tbody */
                    var tbody = document.createElement("tbody");
                    table.appendChild(tbody);

                    function queueClass(val) {
                        if (val == null) return "";
                        if (val >= 120) return "timing-critical";
                        if (val >= 60) return "timing-warn";
                        return "timing-good";
                    }

                    function fmtDateShort(iso) {
                        if (!iso) return '<span class="na">\u2014</span>';
                        var d = new Date(iso);
                        var mon = d.toLocaleString(undefined, {
                            month: "short",
                        });
                        var day = d.getDate();
                        var year = d.getFullYear();
                        var hh = String(d.getHours()).padStart(2, "0");
                        var mm = String(d.getMinutes()).padStart(2, "0");
                        var ss = String(d.getSeconds()).padStart(2, "0");
                        return esc(
                            mon +
                                " " +
                                day +
                                ", " +
                                year +
                                " " +
                                hh +
                                ":" +
                                mm +
                                ":" +
                                ss,
                        );
                    }

                    function fmtSec(val) {
                        if (val == null)
                            return '<span class="na">\u2014</span>';
                        return fmtNum(val, 1);
                    }

                    function renderBody() {
                        tbody.innerHTML = "";
                        rows.forEach(function (row) {
                            var tr = document.createElement("tr");
                            tr.innerHTML =
                                '<td><span class="provider-badge">' +
                                esc(row.provider) +
                                "</span></td>" +
                                "<td>" +
                                esc(row.runner) +
                                "</td>" +
                                "<td>" +
                                fmtDateShort(row.createdAt) +
                                "</td>" +
                                "<td>" +
                                fmtDateShort(row.startedAt) +
                                "</td>" +
                                "<td>" +
                                fmtDateShort(row.stoppedAt) +
                                "</td>" +
                                '<td class="timing-cell">' +
                                fmtSec(row.totalTime) +
                                "</td>" +
                                '<td class="timing-cell ' +
                                queueClass(row.queuedTime) +
                                '">' +
                                fmtSec(row.queuedTime) +
                                "</td>" +
                                '<td class="timing-cell">' +
                                fmtSec(row.runTime) +
                                "</td>" +
                                '<td class="timing-cell">' +
                                fmtSec(row.reportedDur) +
                                "</td>" +
                                '<td class="timing-cell">' +
                                fmtSec(row.reportedQueued) +
                                "</td>";
                            tbody.appendChild(tr);
                        });
                    }

                    function updateSortArrows() {
                        var arrows = table.querySelectorAll(".sort-arrow");
                        for (var i = 0; i < arrows.length; i++) {
                            var arrowEl = arrows[i];
                            var colKey = arrowEl.getAttribute("data-arrow");
                            if (colKey === currentSort.key) {
                                arrowEl.classList.add("active");
                                arrowEl.textContent = currentSort.asc
                                    ? "\u25B2"
                                    : "\u25BC";
                            } else {
                                arrowEl.classList.remove("active");
                                arrowEl.textContent = "\u25B2";
                            }
                        }
                    }

                    /* Initial sort & render */
                    sortRows("createdAt", "date");

                    tableWrap.appendChild(table);
                    section.appendChild(tableWrap);
                    container.appendChild(section);
                }

                /* ---- Footer ---- */

                function renderFooter(allRuns, tierCount) {
                    var combos = {};
                    allRuns.forEach(function (r) {
                        combos[comboKey(r)] = true;
                    });
                    var n = allRuns.length;
                    var m = Object.keys(combos).length;
                    var footer = document.getElementById("footer");
                    footer.textContent =
                        "Data from " +
                        n +
                        " total run" +
                        (n !== 1 ? "s" : "") +
                        " across " +
                        m +
                        " provider/runner combination" +
                        (m !== 1 ? "s" : "") +
                        " in " +
                        tierCount +
                        " hardware tier" +
                        (tierCount !== 1 ? "s" : "");
                    footer.style.display = "";
                }

                /* ---- Init ---- */

                function showError(msg) {
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("error").style.display = "";
                    document.getElementById("error-detail").textContent = msg;
                }

                function init(allRuns) {
                    if (!Array.isArray(allRuns) || allRuns.length === 0) {
                        showError(
                            "data.json is empty or has an unexpected format.",
                        );
                        return;
                    }

                    var latest = dedup(allRuns);
                    var tiers = groupByTier(latest);

                    document.getElementById("loading").style.display = "none";
                    document.getElementById("dashboard").style.display = "";

                    renderHeader(allRuns);

                    tiers.forEach(function (tier, i) {
                        renderTierSection(tier, i);
                    });

                    renderTimingStats(allRuns);
                    renderTimeline(allRuns);
                    renderFooter(allRuns, tiers.length);
                }

                /* Boot */
                fetch("data.json")
                    .then(function (res) {
                        if (!res.ok)
                            throw new Error(
                                "HTTP " +
                                    res.status +
                                    " \u2014 could not fetch data.json",
                            );
                        return res.json();
                    })
                    .then(init)
                    .catch(function (err) {
                        console.error(err);
                        showError(
                            err.message ||
                                "An unknown error occurred while loading data.",
                        );
                    });
            })();
        </script>
    </body>
</html>
